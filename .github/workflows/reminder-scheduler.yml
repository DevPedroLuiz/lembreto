name: Reminder Scheduler

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reminder-scheduler
  cancel-in-progress: false

jobs:
  trigger-reminders:
    name: Trigger reminder notifications
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Verify scheduler secrets
        shell: bash
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

      - name: Trigger notification processing
        shell: bash
        run: |
          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 3 \
            --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/notifications"
