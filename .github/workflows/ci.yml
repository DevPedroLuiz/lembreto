name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lembreto_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lembreto_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify required secrets
        shell: bash
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          test -n "$JWT_SECRET"

      - name: Create CI env file
        shell: bash
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cat <<EOF > .env.local
          DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/lembreto_test?sslmode=disable
          JWT_SECRET=$JWT_SECRET
          PORT=3001
          APP_URL=http://127.0.0.1:3001
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database
        run: npm run setup:test-db

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test

      - name: End-to-end tests
        env:
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
