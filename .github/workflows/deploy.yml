name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "git_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.git_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify deployment secrets
        shell: bash
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install dependencies
        run: npm ci

      - name: Pull production environment
        shell: bash
        run: npx vercel env pull .env.local --environment=production --yes --token="$VERCEL_TOKEN"

      - name: Check production migration database URL
        id: migration_db
        shell: bash
        run: |
          if npx tsx -e "import { config } from 'dotenv'; import { resolveDatabaseUrl } from './lib/db.ts'; config({ path: '.env.local' }); process.exit(resolveDatabaseUrl('migration') ? 0 : 1);"; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping production migrations because no readable database URL was available after vercel env pull. Sensitive Vercel env values are still available to the deployment runtime; run migrations from a trusted environment or configure a CI-readable migration URL."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run production migrations
        if: steps.migration_db.outputs.configured == 'true'
        shell: bash
        env:
          MIGRATION_LOCK_TIMEOUT: 10s
          MIGRATION_STATEMENT_TIMEOUT: 5min
        run: npm run migrate

      - name: Deploy to Vercel
        id: deploy
        shell: bash
        run: |
          npx vercel deploy --prod --yes --token="$VERCEL_TOKEN" | tee vercel-deploy.log
          url=$(grep -Eo 'https://[^ ]+\.vercel\.app' vercel-deploy.log | tail -n 1)
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url"
